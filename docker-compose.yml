services:
  postgres:
    image: postgres:15
    volumes: [postgres_data:/var/lib/postgresql/data]
    env_file: .env

  redis:
    image: redis:7-alpine

  django:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes: [./backend:/app, ./media:/app/media]
    depends_on: [postgres, redis]
    env_file: .env

  scheduler:
    build: ./backend
    command: sh -c "while true; do python manage.py send_reminders; sleep 600; done"
    volumes: [./backend:/app]
    depends_on: [postgres, redis]
    env_file: .env

  nginx:
    build: ./frontend
    ports:
      - "3059:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./media:/app/media
    depends_on: [django]

volumes:
  postgres_data:
