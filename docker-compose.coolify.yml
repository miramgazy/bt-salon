services:
  postgres:
    image: postgres:15
    volumes: 
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-salon}
      POSTGRES_USER: ${POSTGRES_USER:-salon_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  redis:
    image: redis:7-alpine
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M

  django:
    build: ./backend
    command: /app/entrypoint.sh
    volumes: 
      - media_data:/app/media
      - static_data:/app/static
    depends_on: 
      - postgres
      - redis
    # Coolify will natively inject all variables from the UI automatically
    # into the container, so we only list them if we want default fallbacks 
    # or specific mappings.
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-salon}
      POSTGRES_USER: ${POSTGRES_USER:-salon_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      DJANGO_DEBUG: ${DJANGO_DEBUG:-0}
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.6'
          memory: 512M

  nginx:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.production
    ports:
      - "30596:80"
    volumes:
      - media_data:/app/media
      - static_data:/app/static
    depends_on: 
      - django
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M

volumes:
  postgres_data:
  media_data:
  static_data:
