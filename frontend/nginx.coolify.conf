server {
    listen 80;
    client_max_body_size 20M;

    # TMA — отдельный SPA под /tma/
    location /tma/ {
        alias /usr/share/nginx/html/tma/;
        try_files $uri $uri/ /tma/index.html;
    }

    # API — проксируем на Django
    location /api/ {
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API WebSockets
    location /ws/ {
        proxy_pass http://django:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Django Admin
    location /administrator/ {
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files for Django Admin and DRF
    location /static/ {
        alias /app/static/;
    }

    # Media files (uploaded photos, etc.)
    location /media/ {
        alias /app/media/;
    }

    # Admin Panel — основной SPA
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
